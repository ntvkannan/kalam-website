    <line x1="274" y1="324" x2="282" y2="332" stroke="#FDCB6E" stroke-width="10" stroke-linecap="round" />
    <line x1="218" y1="332" x2="226" y2="324" stroke="#FDCB6E" stroke-width="10" stroke-linecap="round" />
    <line x1="274" y1="276" x2="282" y2="268" stroke="#FDCB6E" stroke-width="10" stroke-linecap="round" />
