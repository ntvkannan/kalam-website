<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style type="text/css">
      <![CDATA[
      /* ---- CORE ANIMATIONS ---- */

      /* DevOps Infinity Loop Flow */
      .flow-loop {
        stroke-dasharray: 24 24;
        animation: infinityFlow 2s linear infinite;
      }
      @keyframes infinityFlow {
        from { stroke-dashoffset: 96; }
        to { stroke-dashoffset: 0; }
      }

      /* Connection Lines Flow */
      .flow-line {
        stroke-dasharray: 10 12;
        animation: lineFlow 1.5s linear infinite;
      }
      @keyframes lineFlow {
        to { stroke-dashoffset: -22; }
      }

      /* Gear Rotation for Automation */
      .spin {
        transform-origin: 250px 300px;
        animation: spinRight 8s linear infinite;
      }
      @keyframes spinRight {
        100% { transform: rotate(360deg); }
      }

      /* Floating Elements (Tech Nodes) */
      .float-slow { animation: floatBox 5s ease-in-out infinite alternate; }
      .float-fast { animation: floatBox 3s ease-in-out infinite alternate-reverse; }
      .float-cloud { animation: floatBox 6s ease-in-out infinite alternate; }
      
      @keyframes floatBox {
        0% { transform: translateY(0px); }
        100% { transform: translateY(-15px); }
      }

      /* Pulsing Nodes (Ops & Network) */
      .pulse-node {
        animation: pulseScale 2s infinite alternate;
        transform-origin: 550px 300px;
      }
      @keyframes pulseScale {
        0% { transform: scale(0.85); opacity: 0.7; }
        100% { transform: scale(1.15); opacity: 1; }
      }

      /* Blinking Server Lights */
      .blink-1 { animation: blinker 1.5s infinite; }
      .blink-2 { animation: blinker 1.5s infinite 0.5s; }
      .blink-3 { animation: blinker 1.5s infinite 1s; }
      @keyframes blinker {
        50% { fill: #2D3436; }
      }
      ]]>
    </style>
  </defs>

  <g>
    <path d="M 400 180 C 300 180, 250 210, 250 240" fill="none" stroke="#DFE6E9" stroke-width="6" stroke-linecap="round" />
    <path class="flow-line" d="M 400 180 C 300 180, 250 210, 250 240" fill="none" stroke="#6C5CE7" stroke-width="6" stroke-linecap="round" />

    <path d="M 400 180 C 500 180, 550 210, 550 240" fill="none" stroke="#DFE6E9" stroke-width="6" stroke-linecap="round" />
    <path class="flow-line" d="M 400 180 C 500 180, 550 210, 550 240" fill="none" stroke="#00B894" stroke-width="6" stroke-linecap="round" />

    <path d="M 250 360 L 250 540 L 550 540 L 550 360" fill="none" stroke="#DFE6E9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    
    <path d="M 320 510 L 320 540" fill="none" stroke="#DFE6E9" stroke-width="6" stroke-linecap="round" />
    <path d="M 480 510 L 480 540" fill="none" stroke="#DFE6E9" stroke-width="6" stroke-linecap="round" />

    <path class="flow-line" d="M 400 540 L 250 540 L 250 360" fill="none" stroke="#FD79A8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path class="flow-line" d="M 400 540 L 550 540 L 550 360" fill="none" stroke="#0984E3" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
