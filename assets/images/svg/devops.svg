    <path class="flow-loop" d="M 400 300 C 480 180, 650 180, 650 300 C 650 420, 480 420, 400 300 C 320 180, 150 180, 150 300 C 150 420, 320 420, 400 300 Z" fill="none" stroke="#6C5CE7" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
