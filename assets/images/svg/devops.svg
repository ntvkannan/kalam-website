      <path d="M 35 45 L 20 60 L 35 75 M 50 80 L 65 40 M 80 45 L 95 60 L 80 75" fill="none" stroke="#00CEC9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>

  <circle cx="400" cy="300" r="6" fill="#6C5CE7" opacity="0.8" />

</svg>