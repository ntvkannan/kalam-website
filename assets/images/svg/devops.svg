    <line x1="250" y1="335" x2="250" y2="345" stroke="#FDCB6E" stroke-width="10" stroke-linecap="round" />
    <line x1="205" y1="300" x2="215" y2="300" stroke="#FDCB6E" stroke-width="10" stroke-linecap="round" />
    <line x1="285" y1="300" x2="295" y2="300" stroke="#FDCB6E" stroke-width="10" stroke-linecap="round" />
