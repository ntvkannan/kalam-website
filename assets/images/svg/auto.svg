      <circle cx="35" cy="35" r="6" fill="#FD79A8" />
      <path d="M 45 25 L 35 35" fill="none" stroke="#2D3436" stroke-width="3" stroke-linecap="round" />
      <polygon points="35,35 42,32 38,28" fill="#2D3436" />

      <g transform="translate(0, 60)">
