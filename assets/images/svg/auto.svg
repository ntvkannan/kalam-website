        <rect x="55" y="30" width="18" height="50" rx="4" fill="#FF7675" class="grow-bar" style="animation-delay: 0.2s;" />
        <rect x="85" y="10" width="18" height="70" rx="4" fill="#E84393" class="grow-bar" style="animation-delay: 0.4s;" />
        
        <path d="M 25 50 L 55 25 L 85 5" fill="none" stroke="#2D3436" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="85" cy="5" r="4" fill="#2D3436" />
      </g>
    </g>
  </g>

  <g transform="translate(535, 260)">
    <g class="float-fast">
      <rect x="0" y="0" width="130" height="150" rx="16" fill="#E0F7FA" opacity="0.85" />
      
      <g transform="translate(15, 20)">
        <path d="M 50 15 L 20 60 M 50 15 L 80 60 M 20 60 L 50 100 M 80 60 L 50 100 L 20 60 M 20 60 L 80 60" fill="none" stroke="#00CEC9" stroke-width="4" stroke-linejoin="round" />
        
        <g class="pulse" style="transform-origin: 50px 15px;">
          <circle cx="50" cy="15" r="10" fill="#0984E3" />
          <circle cx="50" cy="15" r="3" fill="#FFF" />
        </g>
        
        <g class="pulse" style="transform-origin: 20px 60px; animation-delay: 0.5s;">
          <circle cx="20" cy="60" r="10" fill="#0984E3" />
          <circle cx="20" cy="60" r="3" fill="#FFF" />
        </g>
        
        <g class="pulse" style="transform-origin: 80px 60px; animation-delay: 1s;">
          <circle cx="80" cy="60" r="10" fill="#0984E3" />
          <circle cx="80" cy="60" r="3" fill="#FFF" />
        </g>
        
        <g class="pulse" style="transform-origin: 50px 100px; animation-delay: 1.5s;">
          <circle cx="50" cy="100" r="10" fill="#00B894" /> <circle cx="50" cy="100" r="3" fill="#FFF" />
        </g>
      </g>
    </g>
  </g>

  <circle cx="340" cy="190" r="5" fill="#FDCB6E" opacity="0.8" class="float-slow" />
  <rect x="440" y="180" width="10" height="10" rx="2" fill="#FD79A8" opacity="0.6" transform="rotate(25 445 185)" class="float-fast" />

</svg>