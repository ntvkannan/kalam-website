        <circle cx="0" cy="0" r="25" fill="none" stroke="#FD79A8" stroke-width="10" />
        <line x1="0" y1="-32" x2="0" y2="-18" stroke="#FD79A8" stroke-width="8" stroke-linecap="round" />
        <line x1="0" y1="18" x2="0" y2="32" stroke="#FD79A8" stroke-width="8" stroke-linecap="round" />
        <line x1="-32" y1="0" x2="-18" y2="0" stroke="#FD79A8" stroke-width="8" stroke-linecap="round" />
        <line x1="18" y1="0" x2="32" y2="0" stroke="#FD79A8" stroke-width="8" stroke-linecap="round" />
        <line x1="-23" y1="-23" x2="-13" y2="-13" stroke="#FD79A8" stroke-width="8" stroke-linecap="round" />
        <line x1="13" y1="13" x2="23" y2="23" stroke="#FD79A8" stroke-width="8" stroke-linecap="round" />
        <line x1="-23" y1="23" x2="-13" y2="13" stroke="#FD79A8" stroke-width="8" stroke-linecap="round" />
        <line x1="13" y1="-13" x2="23" y2="-23" stroke="#FD79A8" stroke-width="8" stroke-linecap="round" />
      </g>
      <circle cx="0" cy="0" r="8" fill="#2D3436" />
    </g>

    <g class="spin">
      <circle cx="0" cy="0" r="45" fill="none" stroke="#6C5CE7" stroke-width="14" />
      <line x1="0" y1="-56" x2="0" y2="-34" stroke="#6C5CE7" stroke-width="12" stroke-linecap="round" />
      <line x1="0" y1="34" x2="0" y2="56" stroke="#6C5CE7" stroke-width="12" stroke-linecap="round" />
      <line x1="-56" y1="0" x2="-34" y2="0" stroke="#6C5CE7" stroke-width="12" stroke-linecap="round" />
      <line x1="34" y1="0" x2="56" y2="0" stroke="#6C5CE7" stroke-width="12" stroke-linecap="round" />
      <line x1="-40" y1="-40" x2="-24" y2="-24" stroke="#6C5CE7" stroke-width="12" stroke-linecap="round" />
      <line x1="24" y1="24" x2="40" y2="40" stroke="#6C5CE7" stroke-width="12" stroke-linecap="round" />
      <line x1="-40" y1="40" x2="-24" y2="24" stroke="#6C5CE7" stroke-width="12" stroke-linecap="round" />
      <line x1="24" y1="-24" x2="40" y2="-40" stroke="#6C5CE7" stroke-width="12" stroke-linecap="round" />
    </g>

    <g class="pulse">
