<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style type="text/css">
      <![CDATA[
      /* ---- CORE ANIMATIONS ---- */

      /* Continuous Data Flow */
      .flow-line {
        stroke-dasharray: 12 12;
        animation: dataFlow 1.5s linear infinite;
      }
      .flow-line-reverse {
        stroke-dasharray: 12 12;
        animation: dataFlowReverse 1.5s linear infinite;
      }
      @keyframes dataFlow {
        to { stroke-dashoffset: -24; }
      }
      @keyframes dataFlowReverse {
        to { stroke-dashoffset: 24; }
      }

      /* Factory Floor Conveyor Belt / Data Bus */
      .conveyor-flow {
        stroke-dasharray: 20 15;
        animation: dataFlowReverse 2s linear infinite;
      }

      /* Gear Rotations (Automation) */
      .spin {
        transform-origin: center;
        animation: spinRight 10s linear infinite;
      }
      .spin-reverse {
        transform-origin: center;
        animation: spinLeft 12s linear infinite;
      }
      @keyframes spinRight { 100% { transform: rotate(360deg); } }
      @keyframes spinLeft { 100% { transform: rotate(-360deg); } }

      /* Floating Elements (Glassy Cards) */
      .float-slow { animation: floatBox 5s ease-in-out infinite alternate; }
      .float-fast { animation: floatBox 3.5s ease-in-out infinite alternate-reverse; }
      
      @keyframes floatBox {
        0% { transform: translateY(0px); }
        100% { transform: translateY(-12px); }
      }

      /* Pulsing Cores & Radio Waves */
      .pulse {
        animation: pulseScale 2s infinite alternate;
        transform-origin: center;
      }
      .radio-wave {
        animation: waveEmit 2s ease-out infinite;
        transform-origin: 400px 100px;
      }
      .radio-wave-delay {
        animation: waveEmit 2s ease-out 1s infinite;
        transform-origin: 400px 100px;
      }
      @keyframes pulseScale {
        0% { transform: scale(0.85); opacity: 0.7; }
        100% { transform: scale(1.15); opacity: 1; }
      }
      @keyframes waveEmit {
        0% { transform: scale(0.5); opacity: 1; stroke-width: 6; }
        100% { transform: scale(2); opacity: 0; stroke-width: 2; }
      }
      
      /* Chart Bar Growth Animation */
      .grow-bar {
        animation: growUp 3s cubic-bezier(0.25, 1, 0.5, 1) infinite alternate;
        transform-origin: bottom;
      }
      @keyframes growUp {
        0%, 20% { transform: scaleY(0.2); }
        80%, 100% { transform: scaleY(1); }
      }
      ]]>
    </style>
  </defs>

  <g>
    <line x1="60" y1="480" x2="740" y2="480" stroke="#2D3436" stroke-width="8" stroke-linecap="round" />

    <path d="M 110 480 L 110 280 L 200 220 L 200 270 L 290 210 L 290 480" fill="none" stroke="#2D3436" stroke-width="8" stroke-linejoin="round" />
    
    <path d="M 690 480 L 690 280 L 600 220 L 600 270 L 510 210 L 510 480" fill="none" stroke="#2D3436" stroke-width="8" stroke-linejoin="round" />

    <rect x="290" y="150" width="220" height="330" rx="15" fill="none" stroke="#2D3436" stroke-width="8" stroke-linejoin="round" />
    
    <line x1="400" y1="150" x2="400" y2="100" stroke="#2D3436" stroke-width="8" stroke-linecap="round" />
    <circle cx="400" cy="100" r="8" fill="#FDCB6E" />
    
    <path class="radio-wave" d="M 375 85 Q 400 65 425 85" fill="none" stroke="#00CEC9" stroke-linecap="round" />
    <path class="radio-wave-delay" d="M 375 85 Q 400 65 425 85" fill="none" stroke="#00CEC9" stroke-linecap="round" />
  </g>

  <g>
    <path d="M 265 310 L 330 310" fill="none" stroke="#DFE6E9" stroke-width="8" stroke-linecap="round" />
    <path class="flow-line" d="M 265 310 L 330 310" fill="none" stroke="#FD79A8" stroke-width="8" stroke-linecap="round" />

    <path d="M 470 310 L 535 310" fill="none" stroke="#DFE6E9" stroke-width="8" stroke-linecap="round" />
    <path class="flow-line" d="M 470 310 L 535 310" fill="none" stroke="#00CEC9" stroke-width="8" stroke-linecap="round" />

    <line x1="130" y1="450" x2="670" y2="450" stroke="#DFE6E9" stroke-width="12" stroke-linecap="round" />
    <line class="conveyor-flow" x1="130" y1="450" x2="670" y2="450" stroke="#6C5CE7" stroke-width="12" stroke-linecap="round" />
  </g>

  <g transform="translate(400, 310)">
    
    <g transform="translate(48, -48)">
