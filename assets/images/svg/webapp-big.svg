<svg xmlns="http://www.w3.org/2000/svg" width="600" height="646" viewBox="0 0 600 646" fill="none">
  <defs>
    <linearGradient id="g1" x1="80" y1="120" x2="520" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6EB4"/>
      <stop offset="0.5" stop-color="#FF3D8F"/>
      <stop offset="1" stop-color="#D63BB7"/>
    </linearGradient>
    <linearGradient id="g2" x1="130" y1="90" x2="460" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD6EE" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFDFF6" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF6EB4"/>
      <stop offset="1" stop-color="#FF3D8F"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF8EC8"/>
      <stop offset="1" stop-color="#FF3D8F"/>
    </linearGradient>
    <filter id="blurGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#A0115E" flood-opacity="0.22"/>
    </filter>
    <style><![CDATA[
      .floatSlow { animation: floatSlow 8s ease-in-out infinite; transform-origin: center; }
      .floatMed { animation: floatMed 6s ease-in-out infinite; transform-origin: center; }
      .floatFast { animation: floatFast 4.5s ease-in-out infinite; transform-origin: center; }
      .pulse { animation: pulse 3.6s ease-in-out infinite; transform-origin: center; }
      .draw { stroke-dasharray: 8 10; animation: dash 7s linear infinite; }
      .codeScroll { animation: codeScroll 7s linear infinite; }
      .spark { animation: spark 2.4s ease-in-out infinite; }
      .gearSpin { animation: spin 16s linear infinite; transform-origin: 390px 380px; }
      .orbit { animation: orbit 10s linear infinite; transform-origin: 300px 320px; }
      .nodePulse { animation: nodePulse 2.8s ease-in-out infinite; }
      .nodePulse2 { animation: nodePulse 2.8s ease-in-out 1.2s infinite; }
      @keyframes floatSlow {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes floatMed {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(8px); }
      }
      @keyframes floatFast {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }
      @keyframes pulse {
        0%,100% { opacity: .8; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      @keyframes dash {
        to { stroke-dashoffset: -120; }
      }
      @keyframes codeScroll {
        0% { transform: translateY(0px); opacity: .95; }
        50% { transform: translateY(-8px); opacity: .8; }
        100% { transform: translateY(0px); opacity: .95; }
      }
      @keyframes spark {
        0%,100% { opacity: .35; }
        50% { opacity: 1; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes orbit {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes nodePulse {
        0%,100% { r: 5; opacity: .75; }
        50% { r: 8; opacity: 1; }
      }
    ]]></style>
  </defs>

  <!-- transparent background -->

  <!-- soft floating glows -->
  <g opacity="0.45" filter="url(#blurGlow)">
    <circle class="pulse" cx="88" cy="136" r="34" fill="#FF6EB4"/>
    <circle class="pulse" cx="504" cy="136" r="38" fill="#FF3D8F"/>
    <circle class="pulse" cx="105" cy="552" r="30" fill="#D63BB7"/>
    <circle class="pulse" cx="510" cy="533" r="28" fill="#FF8EC8"/>
  </g>

  <!-- framing connectors -->
  <path class="draw" d="M95 152C95 125 117 103 144 103H456C483 103 505 125 505 152V486C505 513 483 535 456 535H144C117 535 95 513 95 486V152Z" stroke="url(#g4)" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>
  <circle class="spark" cx="95" cy="320" r="4" fill="#FFD6EE"/>
  <circle class="spark" cx="505" cy="320" r="4" fill="#FFD6EE"/>
  <rect x="135" y="84" width="18" height="18" rx="4" fill="#FFEAF5" opacity="0.8" class="floatFast"/>
  <rect x="448" y="534" width="18" height="18" rx="4" fill="#FFEAF5" opacity="0.8" class="floatFast"/>

  <!-- top header bar -->
  <g class="floatSlow" filter="url(#shadow)">
    <path d="M120 152H480L500 172L480 192H120L100 172L120 152Z" fill="url(#g1)" opacity="0.95"/>
    <circle cx="142" cy="172" r="6" fill="#FFF0F7" opacity="0.9"/>
    <circle cx="160" cy="172" r="6" fill="#FFD6EE" opacity="0.7"/>
    <circle cx="178" cy="172" r="6" fill="#FFDDF6" opacity="0.65"/>
    <rect x="205" y="166" width="160" height="10" rx="5" fill="#FFEAF5" opacity="0.9"/>
    <rect x="377" y="166" width="58" height="10" rx="5" fill="#FFD6EE" opacity="0.75"/>
  </g>

  <!-- main monitor -->
  <g filter="url(#shadow)">
    <rect x="145" y="214" width="310" height="214" rx="28" fill="url(#g2)"/>
    <rect x="162" y="231" width="276" height="180" rx="18" fill="#C2185B" opacity="0.94"/>
    <rect x="248" y="428" width="104" height="16" rx="8" fill="#880E4F" opacity="0.9"/>
    <rect x="212" y="444" width="176" height="18" rx="9" fill="#AD1457" opacity="0.88"/>
    <rect x="270" y="462" width="60" height="58" rx="16" fill="#FFB3D9" opacity="0.95"/>
    <rect x="224" y="520" width="152" height="16" rx="8" fill="#880E4F" opacity="0.85"/>
  </g>

  <!-- screen code blocks -->
  <g class="codeScroll">
    <rect x="185" y="260" width="125" height="98" rx="16" fill="#FFD6EE" opacity="0.9"/>
    <rect x="327" y="250" width="88" height="116" rx="16" fill="#AD1457" opacity="0.4" stroke="#FFB3D9" stroke-opacity="0.5"/>
    <rect x="185" y="376" width="120" height="14" rx="7" fill="#FFD6EE" opacity="0.9"/>
    <rect x="185" y="398" width="78" height="10" rx="5" fill="#FFD6EE" opacity="0.78"/>

    <rect x="205" y="278" width="72" height="8" rx="4" fill="#FF3D8F" opacity="0.95"/>
    <rect x="205" y="294" width="88" height="8" rx="4" fill="#FF3D8F" opacity="0.75"/>
    <rect x="205" y="310" width="61" height="8" rx="4" fill="#FF3D8F" opacity="0.85"/>
    <rect x="205" y="326" width="96" height="8" rx="4" fill="#FF3D8F" opacity="0.65"/>

    <text x="340" y="274" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#FFEAF5">&lt;/&gt;</text>
    <rect x="343" y="294" width="47" height="7" rx="3.5" fill="#FFEAF5" opacity="0.9"/>
    <rect x="343" y="309" width="54" height="7" rx="3.5" fill="#FFEAF5" opacity="0.75"/>
    <rect x="343" y="324" width="39" height="7" rx="3.5" fill="#FFEAF5" opacity="0.8"/>
    <rect x="343" y="339" width="60" height="7" rx="3.5" fill="#FFEAF5" opacity="0.68"/>
  </g>

  <!-- phone panel -->
  <g class="floatMed" filter="url(#shadow)">
    <rect x="76" y="246" width="88" height="194" rx="16" fill="#FFD6EE" opacity="0.92"/>
    <rect x="88" y="264" width="64" height="146" rx="10" fill="#FFB3D9"/>
    <rect x="96" y="282" width="39" height="7" rx="3.5" fill="#C2185B" opacity="0.95"/>
    <rect x="96" y="298" width="46" height="7" rx="3.5" fill="#C2185B" opacity="0.72"/>
    <rect x="96" y="314" width="34" height="7" rx="3.5" fill="#C2185B" opacity="0.85"/>
    <rect x="96" y="330" width="50" height="7" rx="3.5" fill="#C2185B" opacity="0.62"/>
    <rect x="96" y="356" width="41" height="7" rx="3.5" fill="#C2185B" opacity="0.95"/>
    <rect x="96" y="372" width="30" height="7" rx="3.5" fill="#C2185B" opacity="0.72"/>
    <rect x="96" y="388" width="47" height="7" rx="3.5" fill="#C2185B" opacity="0.8"/>
    <circle cx="120" cy="426" r="5" fill="#FFF0F7"/>
  </g>

  <!-- floating chips -->
  <g class="floatSlow" filter="url(#shadow)">
    <rect x="368" y="155" width="94" height="94" rx="47" fill="url(#g3)" opacity="0.95"/>
    <text x="389" y="198" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#FFF0F7">HTML</text>
  </g>

  <g class="floatMed" filter="url(#shadow)">
    <rect x="450" y="270" width="104" height="52" rx="14" fill="#FF8EC8" opacity="0.95"/>
    <text x="481" y="302" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#FFF0F7">JAVA</text>
  </g>

  <g class="floatFast" filter="url(#shadow)">
    <rect x="382" y="455" width="102" height="54" rx="15" fill="#FF6EB4" opacity="0.98"/>
    <text x="418" y="488" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#FFF0F7">CSS</text>
  </g>

  <g class="floatFast" filter="url(#shadow)">
    <rect x="250" y="286" width="67" height="84" rx="10" fill="#FF8EC8" opacity="0.95"/>
    <rect x="256" y="292" width="55" height="72" rx="8" fill="#FF6EB4" opacity="0.45"/>
    <text x="264" y="328" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#FFF0F7">HTML</text>
  </g>

  <!-- small message card -->
  <g class="floatFast" filter="url(#shadow)">
    <path d="M205 260H252V301H224L210 312V301H205V260Z" fill="#FFF0F7" opacity="0.95"/>
    <rect x="214" y="270" width="30" height="4" rx="2" fill="#FF3D8F" opacity="0.9"/>
    <rect x="214" y="279" width="24" height="4" rx="2" fill="#FF3D8F" opacity="0.68"/>
    <rect x="214" y="288" width="34" height="4" rx="2" fill="#FF3D8F" opacity="0.75"/>
  </g>

  <!-- connection line -->
  <path d="M164 385H225C240 385 248 378 248 363V348H350C371 348 378 356 378 372V380" stroke="url(#g4)" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
  <circle class="nodePulse" cx="164" cy="385" r="5" fill="#FFD6EE"/>
  <circle class="nodePulse2" cx="248" cy="348" r="5" fill="#FFD6EE"/>
  <circle class="nodePulse" cx="378" cy="380" r="5" fill="#FFD6EE"/>

  <!-- gear -->
  <g class="gearSpin" filter="url(#shadow)">
    <g transform="translate(390 380)">
      <circle r="28" fill="#FF3D8F" opacity="0.18"/>
      <g fill="#FFF0F7">
        <rect x="-3" y="-43" width="6" height="12" rx="2"/>
        <rect x="-3" y="31" width="6" height="12" rx="2"/>
        <rect x="31" y="-3" width="12" height="6" rx="2"/>
        <rect x="-43" y="-3" width="12" height="6" rx="2"/>
        <rect x="21.5" y="-33.5" width="6" height="12" rx="2" transform="rotate(45)"/>
        <rect x="21.5" y="20.5" width="6" height="12" rx="2" transform="rotate(135)"/>
        <rect x="-33.5" y="20.5" width="6" height="12" rx="2" transform="rotate(-135)"/>
        <rect x="-33.5" y="-33.5" width="6" height="12" rx="2" transform="rotate(-45)"/>
      </g>
      <circle r="20" fill="#C2185B"/>
      <circle r="10" fill="#FFF0F7"/>
    </g>
  </g>

  <!-- orbit elements around center -->
  <g class="orbit" opacity="0.88">
    <circle cx="300" cy="160" r="7" fill="#FFD6EE"/>
    <circle cx="438" cy="320" r="5" fill="#FF8EC8"/>
    <circle cx="302" cy="505" r="6" fill="#FFB3D9"/>
    <circle cx="162" cy="328" r="5" fill="#FF6EB4"/>
  </g>

  <!-- bottom platform -->
  <g class="floatSlow">
    <ellipse cx="300" cy="548" rx="126" ry="15" fill="#880E4F" opacity="0.18"/>
    <path d="M200 560C226 546 374 546 400 560" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" opacity="0.65"/>
  </g>

  <!-- decorative code marks -->
  <g class="spark" opacity="0.65" fill="#FFEAF5" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    <text x="130" y="140">x o _</text>
    <text x="365" y="285">x o _</text>
  </g>
</svg>
