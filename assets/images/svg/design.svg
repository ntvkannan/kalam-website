<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style type="text/css">
      <![CDATA[
      /* Base styles for the line drawing */
      .outline { 
        fill: none; 
        stroke-width: 6; 
        stroke-linecap: round; 
        stroke-linejoin: round; 
      }
      
      /* Vibrant Colorful Strokes */
      .stroke-monitor { stroke: #2D3436; } 
      .stroke-header { stroke: #74B9FF; }  
      .stroke-sidebar { stroke: #A29BFE; } 
      .stroke-main { stroke: #00CEC9; }    
      .stroke-btn { stroke: #00B894; }     
      
      /* Mac-style UI Dots */
      .dot-red { fill: #FF5F56; }
      .dot-yellow { fill: #FFBD2E; }
      .dot-green { fill: #27C93F; }

      /* The Line Drawing Animation */
      .draw-line {
        stroke-dasharray: 2000;
        stroke-dashoffset: 2000;
        animation: draw 3s ease-in-out forwards infinite alternate;
      }
      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }

      /* Fade in animation for the dev code & dots */
      .fade-in {
        opacity: 0;
        animation: fadeIn 3s ease-in-out forwards infinite alternate;
      }
      @keyframes fadeIn {
        40% { opacity: 0; }
        100% { opacity: 1; }
      }

      /* Cursor movement animation */
      .cursor-group {
        animation: moveCursor 3s ease-in-out forwards infinite alternate;
        transform-origin: center;
      }
      @keyframes moveCursor {
        0% { transform: translate(600px, 450px); }
        80% { transform: translate(370px, 350px); }
        100% { transform: translate(370px, 350px) scale(0.9); }
      }
      
      /* Subtle pulse on the button when clicked */
      .button-fill {
        fill: transparent;
        animation: fillButton 3s ease-in-out forwards infinite alternate;
      }
      @keyframes fillButton {
        0%, 80% { fill: transparent; }
        100% { fill: #00B894; }
      }
      
      /* Code text styling */
      .code-text {
        fill: #E84393; 
        font-family: monospace;
        font-size: 64px;
        font-weight: bold;
      }
      ]]>
    </style>
  </defs>

  <g transform="translate(0, 20)">
    <rect class="outline stroke-monitor draw-line" x="150" y="100" width="500" height="320" rx="15" />
    
    <path class="outline stroke-monitor draw-line" d="M400 420 L400 480 M320 480 L480 480" />

    <rect class="outline stroke-header draw-line" x="180" y="130" width="440" height="40" rx="8" />
    
    <circle class="dot-red fade-in" cx="205" cy="150" r="6" />
    <circle class="dot-yellow fade-in" cx="225" cy="150" r="6" />
    <circle class="dot-green fade-in" cx="245" cy="150" r="6" />

    <rect class="outline stroke-sidebar draw-line" x="180" y="190" width="120" height="200" rx="8" />
    <line class="outline stroke-sidebar draw-line" x1="200" y1="220" x2="280" y2="220" />
    <line class="outline stroke-sidebar draw-line" x1="200" y1="250" x2="260" y2="250" />
    <line class="outline stroke-sidebar draw-line" x1="200" y1="280" x2="270" y2="280" />

    <rect class="outline stroke-main draw-line" x="320" y="190" width="300" height="130" rx="8" />
    
    <text x="385" y="275" class="code-text fade-in">&lt;/&gt;</text>

    <rect class="outline stroke-btn draw-line button-fill" x="320" y="340" width="120" height="50" rx="25" />
  </g>

  <g class="cursor-group">
    <path fill="#FDCB6E" stroke="#2D3436" stroke-width="2" stroke-linejoin="round" d="M0,0 L20,15 L12,18 L20,32 L14,35 L6,22 L0,28 Z" transform="scale(1.5)" />
  </g>

</svg>