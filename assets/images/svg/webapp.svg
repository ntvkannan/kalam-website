<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style type="text/css">
      <![CDATA[
      /* ---- CORE ANIMATIONS ---- */

      /* Continuous Line Drawing for Wireframes */
      .draw-line {
        stroke-dasharray: 2500;
        stroke-dashoffset: 2500;
        animation: drawPath 4s cubic-bezier(0.25, 1, 0.5, 1) forwards infinite alternate;
      }
      @keyframes drawPath {
        20% { stroke-dashoffset: 2500; }
        100% { stroke-dashoffset: 0; }
      }

      /* Floating Animation for UI Modules */
      .float-fast { animation: floatBox 3.5s ease-in-out infinite alternate; }
      .float-slow { animation: floatBox 5s ease-in-out infinite alternate-reverse; }
      .float-medium { animation: floatBox 4s ease-in-out infinite alternate; }
      
      @keyframes floatBox {
        0% { transform: translateY(0px); }
        100% { transform: translateY(-15px); }
      }

      /* Data Processing / Loading Bars */
      .slide-load {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: loadingBar 3s ease-in-out infinite alternate;
      }
      @keyframes loadingBar {
        0%, 20% { stroke-dashoffset: 100; }
        80%, 100% { stroke-dashoffset: 0; }
      }

      /* Pulsing Connection Dots */
      .pulse-dot {
        animation: pulse 2s infinite alternate;
      }
      @keyframes pulse {
        0% { opacity: 0.3; transform: scale(0.8); }
        100% { opacity: 1; transform: scale(1.2); }
      }

      /* Dashed Connection Lines */
      .dash-flow {
        stroke-dasharray: 8 8;
        animation: flowDash 2s linear infinite;
      }
      @keyframes flowDash {
        to { stroke-dashoffset: -16; }
      }
      ]]>
    </style>
  </defs>

  <g class="float-slow">
    <path d="M 120 280 L 170 280" fill="none" stroke="#6C5CE7" stroke-width="4" class="dash-flow" />
    <circle cx="80" cy="280" r="40" fill="none" stroke="#6C5CE7" stroke-width="6" />
    <circle cx="80" cy="280" r="30" fill="#6C5CE7" opacity="0.1" />
    <text x="61" y="291" font-family="monospace" font-size="32" font-weight="bold" fill="#6C5CE7">{ }</text>
  </g>

  <g class="float-fast">
    <path d="M 630 200 L 680 200" fill="none" stroke="#0984E3" stroke-width="4" class="dash-flow" />
    <circle cx="720" cy="200" r="40" fill="none" stroke="#0984E3" stroke-width="6" />
    <circle cx="720" cy="200" r="30" fill="#0984E3" opacity="0.1" />
    <text x="695" y="212" font-family="monospace" font-size="28" font-weight="bold" fill="#0984E3">&lt;/&gt;</text>
  </g>


  <g transform="translate(0, 10)">
    <rect class="draw-line" x="170" y="100" width="460" height="380" rx="15" fill="none" stroke="#2D3436" stroke-width="8" stroke-linejoin="round" />
    
    <line class="draw-line" x1="170" y1="150" x2="630" y2="150" stroke="#2D3436" stroke-width="8" stroke-linecap="round" />
    
    <circle cx="205" cy="125" r="7" fill="#FF5F56" />
    <circle cx="230" cy="125" r="7" fill="#FFBD2E" />
    <circle cx="255" cy="125" r="7" fill="#27C93F" />

    <rect class="draw-line" x="195" y="180" width="100" height="270" rx="10" fill="none" stroke="#A29BFE" stroke-width="6" stroke-linejoin="round" />
    
    <line class="slide-load" x1="215" y1="215" x2="275" y2="215" stroke="#A29BFE" stroke-width="8" stroke-linecap="round" />
    <line class="slide-load" x1="215" y1="245" x2="255" y2="245" stroke="#A29BFE" stroke-width="8" stroke-linecap="round" />
    <line class="slide-load" x1="215" y1="275" x2="265" y2="275" stroke="#A29BFE" stroke-width="8" stroke-linecap="round" />
  </g>


  <g class="float-fast" transform="translate(0, 10)">
    <rect x="315" y="180" width="290" height="120" rx="12" fill="#E0F7FA" opacity="0.85" />
    <line class="slide-load" x1="340" y1="215" x2="450" y2="215" stroke="#00CEC9" stroke-width="10" stroke-linecap="round" />
    <line class="slide-load" x1="340" y1="245" x2="400" y2="245" stroke="#00CEC9" stroke-width="10" stroke-linecap="round" />
    <circle cx="560" cy="240" r="18" fill="none" stroke="#00B894" stroke-width="5" />
    <circle cx="560" cy="240" r="8" fill="#00B894" class="pulse-dot" transform-origin="560px 240px" />
  </g>

  <g class="float-medium" transform="translate(0, 10)">
    <rect x="315" y="320" width="135" height="130" rx="12" fill="#FFEAA7" opacity="0.85" />
    <path class="draw-line" d="M 335 420 L 355 380 L 380 400 L 420 350" fill="none" stroke="#FDCB6E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="420" cy="350" r="6" fill="#FDCB6E" />
  </g>

  <g class="float-slow" transform="translate(0, 10)">
    <rect x="470" y="320" width="135" height="130" rx="12" fill="#FCE4EC" opacity="0.85" />
    <line x1="490" y1="360" x2="580" y2="360" stroke="#FD79A8" stroke-width="6" stroke-linecap="round" opacity="0.4" />
    <circle cx="520" cy="360" r="10" fill="#FD79A8" class="pulse-dot" transform-origin="520px 360px" />
    
    <line x1="490" y1="400" x2="580" y2="400" stroke="#FD79A8" stroke-width="6" stroke-linecap="round" opacity="0.4" />
    <circle cx="560" cy="400" r="10" fill="#FD79A8" class="pulse-dot" transform-origin="560px 400px" />
  </g>

  <circle cx="200" cy="80" r="5" fill="#00CEC9" opacity="0.6" class="float-fast" />
  <circle cx="680" cy="450" r="8" fill="#FDCB6E" opacity="0.7" class="float-slow" />
  <rect x="120" y="420" width="10" height="10" rx="2" fill="#FD79A8" opacity="0.5" transform="rotate(45 125 425)" class="float-medium" />

</svg>