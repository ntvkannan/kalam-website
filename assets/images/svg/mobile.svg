<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style type="text/css">
      <![CDATA[
      /* ---- CORE ANIMATIONS ---- */

      /* Device Line Drawing */
      .draw-device {
        stroke-dasharray: 2000;
        stroke-dashoffset: 2000;
        animation: drawOutline 3s cubic-bezier(0.25, 1, 0.5, 1) forwards infinite alternate;
      }
      @keyframes drawOutline {
        20% { stroke-dashoffset: 2000; }
        100% { stroke-dashoffset: 0; }
      }

      /* Inner UI Elements Sliding & Fading Up */
      .ui-slide {
        opacity: 0;
        animation: slideUp 3s ease-out forwards infinite alternate;
      }
      .delay-1 { animation-delay: 0.5s; }
      .delay-2 { animation-delay: 0.8s; }
      .delay-3 { animation-delay: 1.1s; }
      
      @keyframes slideUp {
        0%, 20% { opacity: 0; transform: translateY(20px); }
        80%, 100% { opacity: 1; transform: translateY(0px); }
      }

      /* Floating External Dev Nodes */
      .float-left { animation: floatVertical 4s ease-in-out infinite alternate; }
      .float-right { animation: floatVertical 5s ease-in-out infinite alternate-reverse; }
      .float-fast { animation: floatVertical 3s ease-in-out infinite alternate; }
      
      @keyframes floatVertical {
        0% { transform: translateY(0px); }
        100% { transform: translateY(-20px); }
      }

      /* Data Transfer / Compiling Lines */
      .data-flow {
        stroke-dasharray: 10 12;
        animation: flowDash 1.5s linear infinite;
      }
      @keyframes flowDash {
        to { stroke-dashoffset: -22; }
      }

      /* Pulsing Floating Action Button (FAB) */
      .pulse-btn {
        animation: pulseScale 2s infinite alternate;
        transform-origin: 460px 470px;
      }
      @keyframes pulseScale {
        0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(253, 203, 110, 0.7); }
        100% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(253, 203, 110, 0); }
      }
      ]]>
    </style>
  </defs>

  <g class="float-left">
    <path d="M 180 300 C 230 300, 240 380, 280 380" fill="none" stroke="#6C5CE7" stroke-width="4" stroke-linecap="round" class="data-flow" />
    <circle cx="130" cy="300" r="50" fill="none" stroke="#6C5CE7" stroke-width="6" />
    <circle cx="130" cy="300" r="40" fill="#6C5CE7" opacity="0.1" />
    <text x="105" y="312" font-family="monospace" font-size="34" font-weight="bold" fill="#6C5CE7">{ }</text>
  </g>

  <g class="float-right">
    <path d="M 620 250 C 570 250, 560 180, 520 180" fill="none" stroke="#00CEC9" stroke-width="4" stroke-linecap="round" class="data-flow" />
    <circle cx="670" cy="250" r="50" fill="none" stroke="#00CEC9" stroke-width="6" />
    <circle cx="670" cy="250" r="40" fill="#00CEC9" opacity="0.1" />
    <text x="640" y="262" font-family="monospace" font-size="32" font-weight="bold" fill="#00CEC9">&lt;/&gt;</text>
  </g>


  <g transform="translate(0, 10)">
    <rect class="draw-device" x="280" y="60" width="240" height="460" rx="30" fill="none" stroke="#2D3436" stroke-width="5" stroke-linejoin="round" />
    
    <rect class="draw-device" x="285" y="65" width="230" height="450" rx="25" fill="none" stroke="#2D3436" stroke-width="2" stroke-linejoin="round" />
    
    <rect x="360" y="75" width="80" height="15" rx="7.5" fill="#2D3436" />
    
    <rect x="350" y="500" width="100" height="4" rx="2" fill="#2D3436" opacity="0.5" />

    <g class="ui-slide delay-1">
      <rect x="300" y="95" width="200" height="45" rx="12" fill="#6C5CE7" opacity="0.9" />
      <circle cx="325" cy="117" r="8" fill="#FFF" opacity="0.8" />
      <rect x="345" y="112" width="100" height="10" rx="5" fill="#FFF" opacity="0.8" />
    </g>

    <g class="ui-slide delay-2">
      <rect x="300" y="155" width="200" height="110" rx="12" fill="#00CEC9" opacity="0.8" />
      <path d="M 330 225 L 360 185 L 380 205 L 420 165 L 460 205" fill="none" stroke="#FFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" />
      <circle cx="430" cy="185" r="10" fill="#FFF" opacity="0.6" />
    </g>

    <g class="ui-slide delay-3">
      <rect x="300" y="280" width="200" height="150" rx="12" fill="#FD79A8" opacity="0.8" />
      <rect x="325" y="310" width="150" height="12" rx="6" fill="#FFF" opacity="0.7" />
      <rect x="325" y="335" width="120" height="12" rx="6" fill="#FFF" opacity="0.7" />
      <rect x="325" y="360" width="135" height="12" rx="6" fill="#FFF" opacity="0.7" />
      <rect x="325" y="385" width="100" height="12" rx="6" fill="#FFF" opacity="0.7" />
    </g>

    <g class="ui-slide delay-3 pulse-btn">
      <circle cx="460" cy="470" r="24" fill="#FDCB6E" />
      <line x1="460" y1="458" x2="460" y2="482" stroke="#2D3436" stroke-width="4" stroke-linecap="round" />
      <line x1="448" y1="470" x2="472" y2="470" stroke="#2D3436" stroke-width="4" stroke-linecap="round" />
    </g>
  </g>

  <rect x="200" y="150" width="15" height="15" rx="4" fill="#FD79A8" opacity="0.6" transform="rotate(25 207 157)" class="float-fast" />
  <circle cx="580" cy="450" r="8" fill="#6C5CE7" opacity="0.5" class="float-left" />
  <path d="M 600 120 L 610 100 L 620 120 Z" fill="#FDCB6E" opacity="0.7" transform="rotate(-15 610 110)" class="float-right" />

</svg>