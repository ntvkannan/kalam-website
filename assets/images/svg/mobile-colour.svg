<svg xmlns="http://www.w3.org/2000/svg" width="600" height="646" viewBox="0 0 600 646" fill="none">
  <defs>
    <linearGradient id="phoneBody" x1="170" y1="110" x2="430" y2="530" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="205" y1="155" x2="395" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="tile1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="tile2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="tile3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="tile4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bubbleA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#84CC16"/>
    </linearGradient>
    <linearGradient id="bubbleB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bubbleC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="bubbleD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ambient rings -->
  <g opacity="0.18">
    <circle cx="98" cy="122" r="54" stroke="#06B6D4" stroke-width="2">
      <animate attributeName="r" values="50;58;50" dur="5.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.08;0.25" dur="5.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="488" cy="158" r="44" stroke="#A855F7" stroke-width="2">
      <animate attributeName="r" values="40;48;40" dur="4.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="115" cy="502" r="60" stroke="#F59E0B" stroke-width="2">
      <animate attributeName="r" values="56;64;56" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="505" cy="470" r="50" stroke="#22C55E" stroke-width="2">
      <animate attributeName="r" values="46;54;46" dur="5.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- connector dots -->
  <g opacity="0.4">
    <path d="M147 177 C115 220, 111 278, 140 320" stroke="#A78BFA" stroke-width="2.5" stroke-dasharray="5 9">
      <animate attributeName="stroke-dashoffset" values="0;-42" dur="3.4s" repeatCount="indefinite"/>
    </path>
    <path d="M452 178 C490 215, 490 285, 456 322" stroke="#22D3EE" stroke-width="2.5" stroke-dasharray="5 9">
      <animate attributeName="stroke-dashoffset" values="0;-42" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M171 446 C138 471, 127 502, 150 528" stroke="#F59E0B" stroke-width="2.5" stroke-dasharray="5 9">
      <animate attributeName="stroke-dashoffset" values="0;-42" dur="3.8s" repeatCount="indefinite"/>
    </path>
    <path d="M430 446 C466 472, 476 501, 452 529" stroke="#34D399" stroke-width="2.5" stroke-dasharray="5 9">
      <animate attributeName="stroke-dashoffset" values="0;-42" dur="3.1s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- central phone -->
  <g filter="url(#softShadow)">
    <rect x="162" y="92" width="276" height="462" rx="38" fill="url(#phoneBody)"/>
    <rect x="182" y="132" width="236" height="382" rx="24" fill="url(#screenGrad)"/>
    <rect x="258" y="108" width="84" height="8" rx="4" fill="#E2E8F0" opacity="0.95"/>
    <circle cx="300" cy="534" r="17" fill="#F8FAFC" opacity="0.96"/>
  </g>

  <!-- screen content -->
  <g>
    <text x="300" y="178" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#F8FAFC" letter-spacing="1">MOBILE APP</text>
    <text x="300" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#E9D5FF" opacity="0.95">Design • Build • Launch</text>

    <rect x="210" y="230" width="78" height="78" rx="18" fill="url(#tile1)" opacity="0.95"/>
    <rect x="312" y="230" width="78" height="78" rx="18" fill="url(#tile2)" opacity="0.95"/>
    <rect x="210" y="332" width="78" height="78" rx="18" fill="url(#tile3)" opacity="0.95"/>
    <rect x="312" y="332" width="78" height="78" rx="18" fill="url(#tile4)" opacity="0.95"/>

    <!-- tile icons -->
    <g stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- chat -->
      <path d="M231 252 h36 a8 8 0 0 1 8 8 v20 a8 8 0 0 1 -8 8 h-20 l-12 10 v-10 h-4 a8 8 0 0 1 -8 -8 v-20 a8 8 0 0 1 8 -8z"/>
      <path d="M236 266 h26" opacity="0.9"/>
      <path d="M236 276 h18" opacity="0.9"/>

      <!-- analytics -->
      <path d="M332 287 v-28"/>
      <path d="M351 287 v-42"/>
      <path d="M370 287 v-18"/>
      <path d="M324 287 h54"/>
      <path d="M328 250 C343 260, 355 245, 370 257" opacity="0.9"/>

      <!-- cloud -->
      <path d="M246 390 h24 a12 12 0 0 0 1 -24 a18 18 0 0 0 -34 -5 a11 11 0 0 0 -3 29 h12"/>
      <path d="M249 366 v25"/>
      <path d="M239 382 l10 10 10-10"/>

      <!-- rocket -->
      <path d="M350 354 c18 5 27 22 21 38 c-17 6 -33 -3 -38 -21 c4 -8 9 -13 17 -17z"/>
      <path d="M341 394 l-10 10"/>
      <path d="M364 371 a6 6 0 1 1 -12 0 a6 6 0 0 1 12 0z" fill="#fff" stroke="none"/>
      <path d="M336 401 c8 -1 15 6 14 15 c-9 1 -16 -6 -14 -15z"/>
    </g>

    <!-- bottom nav dots -->
    <g fill="#F8FAFC" opacity="0.95">
      <circle cx="244" cy="454" r="7"/>
      <circle cx="281" cy="454" r="7" opacity="0.65"/>
      <circle cx="318" cy="454" r="7" opacity="0.65"/>
      <circle cx="355" cy="454" r="7" opacity="0.65"/>
    </g>
  </g>

  <!-- floating ecosystem icons -->
  <g filter="url(#glow)">
    <!-- Security -->
    <g transform="translate(93 126)">
      <animateTransform attributeName="transform" type="translate" values="93 126; 93 112; 93 126" dur="4.5s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="36" fill="url(#bubbleA)"/>
      <path d="M-10 -5 v-7 a10 10 0 0 1 20 0 v7" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
      <rect x="-16" y="-2" width="32" height="24" rx="5" fill="#fff" opacity="0.95"/>
      <circle cx="0" cy="9" r="3.6" fill="#22C55E"/>
      <path d="M0 12 v6" stroke="#22C55E" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Device / responsive -->
    <g transform="translate(496 146)">
      <animateTransform attributeName="transform" type="translate" values="496 146; 496 160; 496 146" dur="4.1s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="38" fill="url(#bubbleB)"/>
      <rect x="-16" y="-14" width="32" height="22" rx="3" stroke="#fff" stroke-width="4" fill="none"/>
      <path d="M-7 18 h14" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <path d="M0 8 v10" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Commerce -->
    <g transform="translate(506 492)">
      <animateTransform attributeName="transform" type="translate" values="506 492; 518 492; 506 492" dur="4.9s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="34" fill="url(#bubbleD)"/>
      <path d="M-14 -8 h28 l-3 24 h-22z" fill="#fff" opacity="0.96"/>
      <path d="M-18 -8 h8 l4 -10" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="-7" cy="18" r="3.5" fill="#F59E0B"/>
      <circle cx="7" cy="18" r="3.5" fill="#F59E0B"/>
    </g>

    <!-- Search -->
    <g transform="translate(106 492)">
      <animateTransform attributeName="transform" type="translate" values="106 492; 118 492; 106 492" dur="5.2s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="34" fill="url(#bubbleC)"/>
      <circle cx="-4" cy="-3" r="12" stroke="#fff" stroke-width="4" fill="none"/>
      <path d="M5 6 l10 10" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

  <!-- tiny particles -->
  <g fill="#fff" opacity="0.65">
    <circle cx="144" cy="200" r="4">
      <animate attributeName="cy" values="200;188;200" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="458" cy="228" r="3.5">
      <animate attributeName="cy" values="228;238;228" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="129" cy="418" r="4">
      <animate attributeName="cy" values="418;404;418" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="471" cy="418" r="3.5">
      <animate attributeName="cy" values="418;432;418" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="76" r="5" opacity="0.5">
      <animate attributeName="cy" values="76;92;76" dur="4.7s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
