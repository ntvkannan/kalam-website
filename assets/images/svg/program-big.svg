<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="646" viewBox="0 0 600 646" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated Project Management graphic">

  <defs>
    <style>
      .label { font-family: Arial, sans-serif; font-size: 13px; fill:#2b2b2b; font-weight: 700; }
      .nodeCircle { stroke: rgba(0,0,0,.12); stroke-width: 2; }
      .icon { stroke:#ffffff; stroke-width:2.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .connector { stroke: rgba(34,197,94,.55); stroke-width: 2; stroke-dasharray: 6 5; fill:none; }
      .arrowHead { fill: rgba(34,197,94,.55); }
    </style>

    <!-- Shadows -->
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.14"/>
    </filter>
    <filter id="centreShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <filter id="personShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.20"/>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" class="arrowHead"/>
    </marker>

    <!-- Radial gradient for centre circle — transparent -->
    <radialGradient id="centreGrad" cx="45%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Skin gradient -->
    <radialGradient id="skinGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#f7c9a0"/>
      <stop offset="100%" stop-color="#e8a96e"/>
    </radialGradient>

    <!-- Hair gradient -->
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4a3728"/>
      <stop offset="100%" stop-color="#2c1f14"/>
    </linearGradient>

    <!-- Suit gradient -->
    <linearGradient id="suitGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%"   stop-color="#5a6478"/>
      <stop offset="100%" stop-color="#343d4d"/>
    </linearGradient>

    <!-- Laptop gradient -->
    <linearGradient id="laptopGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c8d0dc"/>
      <stop offset="100%" stop-color="#9daab8"/>
    </linearGradient>

    <!-- Screen glow -->
    <radialGradient id="screenGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#7dd4fc"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>

  </defs>

  <!-- Transparent background -->
  <rect width="600" height="646" fill="none"/>

  <!-- ═══════════════════════════════════════════ -->
  <!--  CONNECTORS (animated dashed lines)         -->
  <!-- ═══════════════════════════════════════════ -->
  <g>
    <!-- top: Planning -->
    <line x1="300" y1="237" x2="300" y2="143" class="connector" marker-end="url(#arrow)">
      <animate attributeName="stroke-dashoffset" from="0" to="-66" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <!-- upper-left: Goals -->
    <line x1="236" y1="261" x2="157" y2="206" class="connector" marker-end="url(#arrow)">
      <animate attributeName="stroke-dashoffset" from="0" to="-66" dur="2.6s" repeatCount="indefinite"/>
    </line>
    <!-- upper-right: Risks -->
    <line x1="364" y1="261" x2="443" y2="206" class="connector" marker-end="url(#arrow)">
      <animate attributeName="stroke-dashoffset" from="0" to="-66" dur="3.0s" repeatCount="indefinite"/>
    </line>
    <!-- right: Control -->
    <line x1="394" y1="320" x2="503" y2="320" class="connector" marker-end="url(#arrow)">
      <animate attributeName="stroke-dashoffset" from="0" to="-66" dur="2.7s" repeatCount="indefinite"/>
    </line>
    <!-- lower-right: Teamwork -->
    <line x1="364" y1="399" x2="443" y2="454" class="connector" marker-end="url(#arrow)">
      <animate attributeName="stroke-dashoffset" from="0" to="-66" dur="2.9s" repeatCount="indefinite"/>
    </line>
    <!-- bottom: Cost -->
    <line x1="300" y1="423" x2="300" y2="521" class="connector" marker-end="url(#arrow)">
      <animate attributeName="stroke-dashoffset" from="0" to="-66" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <!-- lower-left: Communication -->
    <line x1="236" y1="399" x2="157" y2="454" class="connector" marker-end="url(#arrow)">
      <animate attributeName="stroke-dashoffset" from="0" to="-66" dur="3.1s" repeatCount="indefinite"/>
    </line>
    <!-- left: Problem Solving -->
    <line x1="206" y1="320" x2="97" y2="320" class="connector" marker-end="url(#arrow)">
      <animate attributeName="stroke-dashoffset" from="0" to="-66" dur="2.8s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!--  CENTRE CIRCLE                              -->
  <!-- ═══════════════════════════════════════════ -->
  <g filter="url(#centreShadow)">
    <!-- Outer pulse ring -->
    <circle cx="300" cy="330" r="104" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.35">
      <animate attributeName="r" values="104;112;104" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.05;0.25" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <!-- Centre circle — transparent -->
    <circle cx="300" cy="330" r="95" fill="none" stroke="none"/>
  </g>

  <!-- Orbiting accent dots around centre -->
  <g>
    <circle cx="300" cy="230" r="3.5" fill="#16a34a" opacity="0.85">
      <animateTransform attributeName="transform" type="rotate" from="0 300 330" to="360 300 330" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="228" r="2.5" fill="#4ade80" opacity="0.75">
      <animateTransform attributeName="transform" type="rotate" from="120 300 330" to="480 300 330" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="228" r="2" fill="#86efac" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="240 300 330" to="600 300 330" dur="14s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!--  PERSON ILLUSTRATION  (inside centre)       -->
  <!-- ═══════════════════════════════════════════ -->
  <g filter="url(#personShadow)">

    <!-- === SUIT BODY === -->
    <!-- Jacket base -->
    <path d="M258,415 C252,390 248,370 248,355 C248,340 260,330 275,327
             L283,325 L300,340 L317,325 L325,327
             C340,330 352,340 352,355 C352,370 348,390 342,415 Z"
          fill="url(#suitGrad)"/>

    <!-- Shirt / white collar centre -->
    <path d="M291,325 L300,340 L309,325 L305,322 L300,330 L295,322 Z"
          fill="#f0f0f0"/>

    <!-- Tie -->
    <path d="M296,326 L300,340 L304,326 L302,322 L300,325 L298,322 Z"
          fill="#c0392b"/>
    <path d="M298,335 L300,346 L302,335 L300,332 Z" fill="#96281b"/>

    <!-- Left lapel -->
    <path d="M283,325 L272,318 L274,330 L285,333 Z" fill="#4a5568"/>
    <!-- Right lapel -->
    <path d="M317,325 L328,318 L326,330 L315,333 Z" fill="#4a5568"/>

    <!-- Left arm -->
    <path d="M248,355 C242,358 235,368 232,382 C229,396 230,408 232,415
             L248,415 C248,408 249,396 250,383 C251,372 251,362 248,355 Z"
          fill="url(#suitGrad)"/>
    <!-- Right arm -->
    <path d="M352,355 C358,358 365,368 368,382 C371,396 370,408 368,415
             L352,415 C352,408 351,396 350,383 C349,372 349,362 352,355 Z"
          fill="url(#suitGrad)"/>

    <!-- Sleeve cuffs -->
    <rect x="230" y="412" width="19" height="6" rx="3" fill="#c8d0dc"/>
    <rect x="351" y="412" width="19" height="6" rx="3" fill="#c8d0dc"/>

    <!-- Hands (left) -->
    <ellipse cx="237" cy="421" rx="10" ry="7" fill="url(#skinGrad)"/>
    <!-- Hands (right) -->
    <ellipse cx="363" cy="421" rx="10" ry="7" fill="url(#skinGrad)"/>

    <!-- === LAPTOP === -->
    <!-- Screen back (slightly angled) -->
    <path d="M250,380 L350,380 L345,415 L255,415 Z" fill="url(#laptopGrad)"/>
    <!-- Screen face -->
    <path d="M256,383 L344,383 L340,412 L260,412 Z" fill="url(#screenGrad)"/>
    <!-- Screen glare -->
    <path d="M262,386 L278,386 L276,395 L260,395 Z" fill="white" opacity="0.25"/>
    <!-- Screen content: tiny chart lines -->
    <line x1="270" y1="400" x2="290" y2="393" stroke="white" stroke-width="1.2" opacity="0.6"/>
    <line x1="290" y1="393" x2="305" y2="398" stroke="white" stroke-width="1.2" opacity="0.6"/>
    <line x1="305" y1="398" x2="320" y2="388" stroke="white" stroke-width="1.2" opacity="0.6"/>
    <circle cx="270" cy="400" r="1.5" fill="#7dd4fc" opacity="0.9"/>
    <circle cx="290" cy="393" r="1.5" fill="#7dd4fc" opacity="0.9"/>
    <circle cx="305" cy="398" r="1.5" fill="#7dd4fc" opacity="0.9"/>
    <circle cx="320" cy="388" r="1.5" fill="#7dd4fc" opacity="0.9"/>
    <!-- Screen cursor blink -->
    <rect x="322" y="387" width="1.5" height="7" fill="white" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0;0.9" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <!-- Laptop base / keyboard -->
    <path d="M250,415 L350,415 L360,422 L240,422 Z" fill="#9daab8"/>
    <!-- Trackpad -->
    <rect x="290" y="417" width="20" height="3" rx="1.5" fill="#b8c4d0"/>

    <!-- === NECK === -->
    <rect x="293" y="310" width="14" height="18" rx="4" fill="url(#skinGrad)"/>

    <!-- === HEAD === -->
    <!-- Head shape -->
    <ellipse cx="300" cy="288" rx="28" ry="32" fill="url(#skinGrad)"/>
    <!-- Ear left -->
    <ellipse cx="272" cy="290" rx="5" ry="7" fill="#e8a96e"/>
    <ellipse cx="272" cy="290" rx="3" ry="4.5" fill="#d4926a"/>
    <!-- Ear right -->
    <ellipse cx="328" cy="290" rx="5" ry="7" fill="#e8a96e"/>
    <ellipse cx="328" cy="290" rx="3" ry="4.5" fill="#d4926a"/>

    <!-- === HAIR === -->
    <path d="M272,270 Q278,254 300,252 Q322,254 328,270
             Q320,256 300,256 Q280,256 272,270 Z"
          fill="url(#hairGrad)"/>
    <path d="M272,270 Q270,262 272,258 Q278,250 300,248 Q322,250 328,258 Q330,262 328,270
             Q322,260 300,260 Q278,260 272,270 Z"
          fill="url(#hairGrad)"/>
    <!-- Side hair -->
    <path d="M272,270 L270,280 Q269,272 271,266 Z" fill="url(#hairGrad)"/>
    <path d="M328,270 L330,280 Q331,272 329,266 Z" fill="url(#hairGrad)"/>

    <!-- === GLASSES === -->
    <!-- Bridge -->
    <line x1="292" y1="287" x2="308" y2="287" stroke="#555" stroke-width="1.8"/>
    <!-- Left lens frame -->
    <rect x="278" y="282" width="14" height="10" rx="4" fill="none" stroke="#555" stroke-width="1.8"/>
    <!-- Right lens frame -->
    <rect x="308" y="282" width="14" height="10" rx="4" fill="none" stroke="#555" stroke-width="1.8"/>
    <!-- Lens tints -->
    <rect x="278" y="282" width="14" height="10" rx="4" fill="#aacde8" opacity="0.28"/>
    <rect x="308" y="282" width="14" height="10" rx="4" fill="#aacde8" opacity="0.28"/>
    <!-- Temple left -->
    <line x1="278" y1="287" x2="270" y2="289" stroke="#555" stroke-width="1.8"/>
    <!-- Temple right -->
    <line x1="322" y1="287" x2="330" y2="289" stroke="#555" stroke-width="1.8"/>

    <!-- === EYES (behind glasses) === -->
    <ellipse cx="285" cy="287" rx="4" ry="4" fill="#2c1f14"/>
    <ellipse cx="315" cy="287" rx="4" ry="4" fill="#2c1f14"/>
    <!-- Eye whites -->
    <ellipse cx="285" cy="287" rx="4.5" ry="4.5" fill="white" opacity="0.15"/>
    <ellipse cx="315" cy="287" rx="4.5" ry="4.5" fill="white" opacity="0.15"/>
    <!-- Pupils -->
    <circle cx="286" cy="287" r="2" fill="#111"/>
    <circle cx="316" cy="287" r="2" fill="#111"/>
    <!-- Eye shine -->
    <circle cx="287" cy="286" r="0.8" fill="white"/>
    <circle cx="317" cy="286" r="0.8" fill="white"/>

    <!-- === EYEBROWS === -->
    <path d="M280,280 Q285,277 290,279" fill="none" stroke="#2c1f14" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M310,279 Q315,277 320,280" fill="none" stroke="#2c1f14" stroke-width="1.8" stroke-linecap="round"/>

    <!-- === NOSE === -->
    <path d="M298,292 Q296,300 294,302 Q298,305 300,304 Q302,305 306,302 Q304,300 302,292"
          fill="none" stroke="#c8885a" stroke-width="1.4" stroke-linecap="round"/>

    <!-- === MOUTH (slight smile) === -->
    <path d="M293,308 Q300,313 307,308" fill="none" stroke="#b5704a" stroke-width="1.6" stroke-linecap="round"/>

    <!-- === POCKET SQUARE === -->
    <path d="M289,340 L295,338 L295,345 L289,344 Z" fill="#f0f0f0" opacity="0.85"/>

    <!-- === SUIT BUTTON === -->
    <circle cx="300" cy="358" r="2" fill="#2d3748" opacity="0.6"/>
    <circle cx="300" cy="368" r="2" fill="#2d3748" opacity="0.6"/>

  </g>
  <!-- END PERSON -->

  <!-- Screen animation: pulsing glow -->
  <ellipse cx="300" cy="397" rx="45" ry="17" fill="#4ade80" opacity="0">
    <animate attributeName="opacity" values="0;0.08;0" dur="2.2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ═══════════════════════════════════════════ -->
  <!--  NODES (8 orbiting circles)                 -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- 1. PLANNING (top) -->
  <g filter="url(#nodeShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-7; 0,0" dur="3.2s" repeatCount="indefinite"/>
    <circle cx="300" cy="112" r="46" fill="#16a34a" class="nodeCircle"/>
    <!-- Calendar icon -->
    <rect x="283" y="97" width="34" height="30" rx="5" class="icon"/>
    <line x1="283" y1="107" x2="317" y2="107" class="icon"/>
    <line x1="291" y1="93" x2="291" y2="101" class="icon"/>
    <line x1="309" y1="93" x2="309" y2="101" class="icon"/>
    <line x1="290" y1="115" x2="296" y2="115" class="icon"/>
    <line x1="299" y1="115" x2="305" y2="115" class="icon"/>
    <line x1="308" y1="115" x2="314" y2="115" class="icon"/>
    <line x1="290" y1="122" x2="296" y2="122" class="icon"/>
    <line x1="299" y1="122" x2="305" y2="122" class="icon"/>
    <text x="300" y="174" text-anchor="middle" class="label">Planning</text>
  </g>

  <!-- 2. GOALS (upper-left) -->
  <g filter="url(#nodeShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; -7,4; 0,0" dur="3.4s" repeatCount="indefinite"/>
    <circle cx="125" cy="188" r="46" fill="#4ade80" class="nodeCircle"/>
    <!-- Target / bullseye icon -->
    <circle cx="125" cy="188" r="17" class="icon"/>
    <circle cx="125" cy="188" r="9" class="icon"/>
    <circle cx="125" cy="188" r="3" fill="white" opacity="0.9"/>
    <!-- Arrow into target -->
    <line x1="138" y1="175" x2="129" y2="184" class="icon"/>
    <polyline points="138,175 138,181 132,181" class="icon"/>
    <text x="125" y="250" text-anchor="middle" class="label">Goals</text>
  </g>

  <!-- 3. RISKS (upper-right) -->
  <g filter="url(#nodeShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 7,4; 0,0" dur="3.3s" repeatCount="indefinite"/>
    <circle cx="475" cy="188" r="46" fill="#15803d" class="nodeCircle"/>
    <!-- Warning triangle icon -->
    <path d="M475,168 L494,204 H456 Z" class="icon"/>
    <line x1="475" y1="179" x2="475" y2="192" class="icon"/>
    <circle cx="475" cy="198" r="2.5" fill="white" opacity="0.9"/>
    <text x="475" y="250" text-anchor="middle" class="label">Risks</text>
  </g>

  <!-- 4. CONTROL (right) -->
  <g filter="url(#nodeShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 7,0; 0,0" dur="3.1s" repeatCount="indefinite"/>
    <circle cx="537" cy="320" r="46" fill="#22c55e" class="nodeCircle"/>
    <!-- Sliders icon -->
    <line x1="520" y1="307" x2="554" y2="307" class="icon"/>
    <circle cx="533" cy="307" r="5" class="icon"/>
    <line x1="520" y1="320" x2="554" y2="320" class="icon"/>
    <circle cx="545" cy="320" r="5" class="icon"/>
    <line x1="520" y1="333" x2="554" y2="333" class="icon"/>
    <circle cx="529" cy="333" r="5" class="icon"/>
    <text x="537" y="382" text-anchor="middle" class="label">Control</text>
  </g>

  <!-- 5. TEAMWORK (lower-right) -->
  <g filter="url(#nodeShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 7,-4; 0,0" dur="3.5s" repeatCount="indefinite"/>
    <circle cx="475" cy="470" r="46" fill="#86efac" class="nodeCircle"/>
    <!-- People icon -->
    <circle cx="466" cy="461" r="7" class="icon"/>
    <circle cx="484" cy="461" r="7" class="icon"/>
    <path d="M452,484 Q459,470 474,473 Q489,470 496,484" class="icon"/>
    <!-- Centre person -->
    <circle cx="475" cy="458" r="5" fill="white" opacity="0.25"/>
    <text x="475" y="532" text-anchor="middle" class="label">Teamwork</text>
  </g>

  <!-- 6. COST (bottom) -->
  <g filter="url(#nodeShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,7; 0,0" dur="3.0s" repeatCount="indefinite"/>
    <circle cx="300" cy="551" r="46" fill="#166534" class="nodeCircle"/>
    <!-- Dollar / coin stack icon -->
    <ellipse cx="300" cy="544" rx="15" ry="8" class="icon"/>
    <path d="M285,544 L285,558 Q285,566 300,566 Q315,566 315,558 L315,544" class="icon"/>
    <ellipse cx="300" cy="544" rx="15" ry="8" fill="white" opacity="0.12"/>
    <text x="300" y="612" text-anchor="middle" class="label">Cost</text>
  </g>

  <!-- 7. COMMUNICATION (lower-left) -->
  <g filter="url(#nodeShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; -7,-4; 0,0" dur="3.6s" repeatCount="indefinite"/>
    <circle cx="125" cy="470" r="46" fill="#4ade80" class="nodeCircle"/>
    <!-- Chat bubble icon -->
    <path d="M109,456 H141 Q150,456 150,464 V478 Q150,486 141,486 H129 L118,497 V486 H109 Q100,486 100,478 V464 Q100,456 109,456 Z" class="icon"/>
    <line x1="113" y1="468" x2="146" y2="468" class="icon"/>
    <line x1="113" y1="477" x2="136" y2="477" class="icon"/>
    <text x="125" y="532" text-anchor="middle" class="label">Communication</text>
  </g>

  <!-- 8. PROBLEM SOLVING (left) -->
  <g filter="url(#nodeShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; -7,0; 0,0" dur="3.2s" repeatCount="indefinite"/>
    <circle cx="63" cy="320" r="46" fill="#14532d" class="nodeCircle"/>
    <!-- Light-bulb icon -->
    <path d="M63,297
             C53,297 46,304 46,312
             C46,320 51,325 57,327
             L57,334 L69,334 L69,327
             C75,325 80,320 80,312
             C80,304 73,297 63,297 Z"
          class="icon"/>
    <line x1="57" y1="338" x2="69" y2="338" class="icon"/>
    <line x1="59" y1="343" x2="67" y2="343" class="icon"/>
    <!-- Glow inside bulb -->
    <circle cx="63" cy="313" r="5" fill="white" opacity="0.2"/>
    <text x="63" y="382" text-anchor="middle" class="label">Problem Solving</text>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!--  SUBTLE AMBIENT GLOW PULSE                  -->
  <!-- ═══════════════════════════════════════════ -->
  <circle cx="300" cy="330" r="140" fill="none" stroke="#22c55e" stroke-width="1" opacity="0">
    <animate attributeName="r" values="95;145;95" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.12;0" dur="4.5s" repeatCount="indefinite"/>
  </circle>

</svg>